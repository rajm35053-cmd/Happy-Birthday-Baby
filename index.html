<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Baby ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff5f9e,#ffb6d9,#ffd6e8);
overflow-x:hidden;
color:white;
}

/* Floating Hearts */

.heart{
position:fixed;
bottom:-50px;
font-size:25px;
animation:float 10s linear infinite;
opacity:.8;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* Hero */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:70px;
text-shadow:0 0 20px #ff0077;
animation:glow 2s infinite alternate;
}

.hero h2{
margin-top:20px;
font-size:28px;
font-weight:300;
}

@keyframes glow{

from{
text-shadow:0 0 10px #fff;
}

to{
text-shadow:0 0 30px #ff0088;
}

}

button{

margin-top:40px;
padding:18px 40px;
font-size:18px;
border:none;
border-radius:50px;
background:white;
color:#ff2d75;
cursor:pointer;
transition:.4s;
font-weight:bold;
}

button:hover{

transform:scale(1.08);

}

/* Sections */

section{

padding:80px 20px;

}

.title{

font-size:45px;

text-align:center;

margin-bottom:40px;

font-family:'Great Vibes',cursive;

}

/* Gallery */

.gallery{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

max-width:1200px;

margin:auto;

}

.gallery img{

width:100%;

border-radius:20px;

box-shadow:0 0 20px rgba(255,255,255,.4);

transition:.4s;

}

.gallery img:hover{

transform:scale(1.05);

}

/* Letter */

.letter{

max-width:900px;

margin:auto;

background:rgba(255,255,255,.15);

padding:40px;

border-radius:25px;

backdrop-filter:blur(15px);

font-size:20px;

line-height:2;

}

/* Countdown */

.countdown{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.box{

background:white;

color:#ff2d75;

padding:20px;

width:120px;

border-radius:20px;

font-size:40px;

font-weight:bold;

}

.box span{

display:block;

font-size:18px;

margin-top:10px;

}

/* Surprise */

#surprise{

display:none;

font-size:40px;

text-align:center;

padding:80px 20px;

animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}

footer{

padding:50px;

text-align:center;

font-size:22px;

}

</style>

</head>

<body>

<div id="hearts"></div>

<div class="hero">

<h1>Happy Birthday Baby ❤️</h1>

<h2>To My Beautiful Nisha 💖</h2>

<button onclick="document.getElementById('gallery').scrollIntoView()">
Open My Surprise 🎁
</button>

</div>
